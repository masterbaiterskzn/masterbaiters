<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Baiters | Social Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        .brand-font {
            font-family: 'Oswald', sans-serif;
        }

        /* Animated Background - Dark Water Theme */
        .ocean-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: rise 15s infinite ease-in;
            bottom: -100px;
        }

        @keyframes rise {
            0% { bottom: -100px; transform: translateX(0); opacity: 0; }
            50% { opacity: 0.3; }
            100% { bottom: 100%; transform: translateX(-100px); opacity: 0; }
        }

        /* Logo Container - Centered and Prominent */
        .logo-wrapper {
            position: relative;
            animation: float 6s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(0, 0, 0, 0.8));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Glow effect behind logo */
        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            z-index: -1;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Social Buttons - Positioned Around Logo */
        .social-orbit {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .social-btn {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: absolute;
        }

        .social-btn:hover {
            transform: scale(1.15);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            z-index: 50;
        }

        /* Positioning for Desktop */
        @media (min-width: 768px) {
            .pos-top-left { top: 10%; left: 5%; }
            .pos-top-right { top: 10%; right: 5%; }
            .pos-bottom-left { bottom: 10%; left: 5%; }
            .pos-bottom-right { bottom: 10%; right: 5%; }
        }

        /* Positioning for Mobile - Grid Layout */
        @media (max-width: 767px) {
            .social-orbit {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
                padding: 0 1rem;
            }
            .social-btn {
                position: relative;
                top: auto !important;
                left: auto !important;
                right: auto !important;
                bottom: auto !important;
            }
        }

        /* Platform Specific Colors */
        .btn-tiktok:hover { border-color: #ff0050; box-shadow: 0 0 30px rgba(255, 0, 80, 0.3); }
        .btn-insta:hover { border-color: #E1306C; box-shadow: 0 0 30px rgba(225, 48, 108, 0.3); }
        .btn-fb:hover { border-color: #1877F2; box-shadow: 0 0 30px rgba(24, 119, 242, 0.3); }
        .btn-yt:hover { border-color: #FF0000; box-shadow: 0 0 30px rgba(255, 0, 0, 0.3); }

        /* Entrance Animations */
        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0);
            animation: ripple-animation 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center relative">

    <!-- Background Animation -->
    <div class="ocean-bg" id="bubbleContainer"></div>

    <!-- Main Container -->

                <!-- Actual Logo Image -->
                <div class="relative w-64 h-64 md:w-80 md:h-80 lg:w-96 lg:h-96 mx-auto">
                    <img 
                        src="https://raw.githubusercontent.com/masterbaiterskzn/masterbaiters/main/Black%20and%20White%20Modern%20Streetwear%20Sport%20Logo_20251110_220617_0000.png" 
                        alt="Master Baiters Logo" 
                        class="w-full h-full object-contain drop-shadow-2xl"

            <!-- Tagline -->

               class="social-btn btn-tiktok pos-top-left rounded-2xl p-4 md:p-6 flex flex-col items-center gap-2 fade-in-up delay-200 group">
                <svg class="w-8 h-8 md:w-10 md:h-10 text-white group-hover:text-[#ff0050] transition-colors" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/>
                </svg>
                <span class="font-bold text-sm md:text-base">TikTok</span>
                <span class="text-[10px] text-gray-500 hidden md:block">@masterbaiterskzn</span>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/masterbaiterskzn" target="_blank" 
               class="social-btn btn-insta pos-top-right rounded-2xl p-4 md:p-6 flex flex-col items-center gap-2 fade-in-up delay-300 group">
                <svg class="w-8 h-8 md:w-10 md:h-10 text-white group-hover:text-pink-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                </svg>
                <span class="font-bold text-sm md:text-base">Instagram</span>
                <span class="text-[10px] text-gray-500 hidden md:block">@m.a.s.t.e.r_b.a.i.t.e.r.s</span>
            </a>

            <!-- Facebook -->
            <a href="https://www.facebook.com/share/1CCjVKbcYX/" target="_blank" 
               class="social-btn btn-fb pos-bottom-left rounded-2xl p-4 md:p-6 flex flex-col items-center gap-2 fade-in-up delay-400 group">
                <svg class="w-8 h-8 md:w-10 md:h-10 text-white group-hover:text-blue-500 transition-colors" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                <span class="font-bold text-sm md:text-base">Facebook</span>
                <span class="text-[10px] text-gray-500 hidden md:block">Master Baiters</span>
            </a>

            <!-- YouTube -->
            <a href="https://youtube.com/@masterbaiters-d5b" target="_blank" 
               class="social-btn btn-yt pos-bottom-right rounded-2xl p-4 md:p-6 flex flex-col items-center gap-2 fade-in-up delay-500 group">
                <svg class="w-8 h-8 md:w-10 md:h-10 text-white group-hover:text-red-600 transition-colors" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
                <span class="font-bold text-sm md:text-base">YouTube</span>
                <span class="text-[10px] text-gray-500 hidden md:block">@masterbaiters-d5b</span>
            </a>

        </div>

        <!-- Footer -->
        <footer class="mt-12 md:mt-16 text-gray-600 text-xs fade-in-up delay-500">
            <p>&copy; 2025 Master Baiters. All rights reserved.</p>
        </footer>

    </main>

    <script>
        // Generate Background Bubbles
        const bubbleContainer = document.getElementById('bubbleContainer');
        const bubbleCount = 15;

        for (let i = 0; i < bubbleCount; i++) {
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            const size = Math.random() * 40 + 10 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.animationDuration = Math.random() * 10 + 10 + 's';
            bubble.style.animationDelay = Math.random() * 5 + 's';
            bubbleContainer.appendChild(bubble);
        }

        // Ripple Effect on Click
        document.querySelectorAll('.social-btn').forEach(button => {
            button.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = e.clientX - rect.left - size/2 + 'px';
                ripple.style.top = e.clientY - rect.top - size/2 + 'px';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Parallax Effect on Mouse Move (Desktop only)
        if (window.innerWidth > 768) {
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 20;
                const y = (e.clientY / window.innerHeight - 0.5) * 20;
                
                document.querySelector('.logo-wrapper').style.transform = 
                    `translate(${x}px, ${y}px)`;
            });
        }
    </script>
</body>
</html>
